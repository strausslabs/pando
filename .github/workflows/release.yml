name: Release

on:
  schedule:
    - cron: "0 9 * * *" # daily at 09:00 UTC
  workflow_dispatch: {} # allow a manual release

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      # A strausslabs GitHub App (Contents: write) installed on this repo and
      # added as a ruleset bypass actor. Its short-lived token can push the
      # regenerated formula straight to main; the default GITHUB_TOKEN cannot.
      # If the app secrets are absent the step yields an empty token and the
      # formula update no-ops.
      - name: Mint formula-push token
        id: app
        if: vars.FORMULA_APP_ID != ''
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ vars.FORMULA_APP_ID }}
          private-key: ${{ secrets.FORMULA_APP_PRIVATE_KEY }}

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # need tags + full history to diff since last release
          # Use the app token so the persisted git credentials can push the
          # formula to main (a bypass actor); falls back to the default token.
          token: ${{ steps.app.outputs.token || github.token }}
          persist-credentials: true

      - name: Decide whether to release
        id: decide
        run: |
          last="$(git tag --list 'v*' --sort=-v:refname | head -n1)"
          if [ -z "$last" ]; then
            echo "no prior tag; first release"
            echo "version=v0.1.0" >> "$GITHUB_OUTPUT"
            echo "release=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          # Exclude Formula/pando.rb: every release pushes its own "brew:" bump
          # commit to main, which would otherwise always count as a change and
          # re-release daily forever.
          if [ -z "$(git rev-list "$last"..HEAD -- . ':(exclude)Formula/pando.rb')" ]; then
            echo "no commits since $last; skipping"
            echo "release=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          # bump patch: vMAJOR.MINOR.PATCH -> vMAJOR.MINOR.(PATCH+1)
          ver="${last#v}"
          major="${ver%%.*}"; rest="${ver#*.}"
          minor="${rest%%.*}"; patch="${rest#*.}"
          next="v${major}.${minor}.$((patch + 1))"
          echo "releasing $next (since $last)"
          echo "version=$next" >> "$GITHUB_OUTPUT"
          echo "release=true" >> "$GITHUB_OUTPUT"

      - uses: actions/setup-go@v5
        if: steps.decide.outputs.release == 'true'
        with:
          go-version: "1.26"
          cache: true

      - uses: oven-sh/setup-bun@v2
        if: steps.decide.outputs.release == 'true'
        with:
          bun-version: latest

      - name: Build UI (embedded by the binary)
        if: steps.decide.outputs.release == 'true'
        working-directory: ui
        run: |
          bun install --frozen-lockfile
          bun run build

      - name: Cross-compile binaries
        if: steps.decide.outputs.release == 'true'
        env:
          VERSION: ${{ steps.decide.outputs.version }}
          CGO_ENABLED: "0"
        run: |
          mkdir -p dist
          for target in darwin/arm64 linux/amd64 linux/arm64; do
            os="${target%/*}"; arch="${target#*/}"
            stage="build/${os}-${arch}"
            mkdir -p "$stage"
            echo "building pando-${os}-${arch}"
            # binary is named "pando" inside the tarball so the brew formula can
            # do a plain bin.install "pando".
            GOOS="$os" GOARCH="$arch" go build -trimpath \
              -ldflags "-s -w -X main.version=${VERSION}" \
              -o "$stage/pando" ./cmd/pando
            tar -czf "dist/pando-${os}-${arch}.tar.gz" -C "$stage" pando
          done
          ( cd dist && sha256sum *.tar.gz > checksums.txt )

      - name: Tag and publish release
        if: steps.decide.outputs.release == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.decide.outputs.version }}
        run: |
          git tag "$VERSION"
          git push origin "$VERSION"
          gh release create "$VERSION" \
            --title "$VERSION" \
            --generate-notes \
            dist/*.tar.gz dist/checksums.txt

      # Regenerate Formula/pando.rb in this repo so `brew upgrade` tracks every
      # release, pushing to ruleset-protected main with the GitHub App token
      # (the app is a bypass actor; the default GITHUB_TOKEN is not). No app
      # token -> the step is skipped.
      - name: Update Homebrew formula
        if: steps.decide.outputs.release == 'true' && steps.app.outputs.token != ''
        env:
          VERSION: ${{ steps.decide.outputs.version }}
          REPO: ${{ github.repository }}
          APP_SLUG: ${{ steps.app.outputs.app-slug }}
        run: |
          sha() { awk -v f="$1" '$2==f {print $1}' dist/checksums.txt; }
          dar_arm="$(sha pando-darwin-arm64.tar.gz)"
          lnx_amd="$(sha pando-linux-amd64.tar.gz)"
          lnx_arm="$(sha pando-linux-arm64.tar.gz)"
          base="https://github.com/${REPO}/releases/download/${VERSION}"

          mkdir -p Formula
          cat > Formula/pando.rb <<EOF
          class Pando < Formula
            desc "Fast multi-worktree dev environments"
            homepage "https://github.com/${REPO}"
            version "${VERSION#v}"

            on_macos do
              on_arm do
                url "${base}/pando-darwin-arm64.tar.gz"
                sha256 "${dar_arm}"
              end
            end

            on_linux do
              on_intel do
                url "${base}/pando-linux-amd64.tar.gz"
                sha256 "${lnx_amd}"
              end
              on_arm do
                url "${base}/pando-linux-arm64.tar.gz"
                sha256 "${lnx_arm}"
              end
            end

            def install
              bin.install "pando"
            end

            def caveats
              <<~CAVEATS
                Driving Pando with an AI agent? Run:
                  pando setup
                to install the pando.star skill into ~/.claude/skills and register the
                MCP server (claude mcp add pando -- pando mcp).
              CAVEATS
            end

            test do
              assert_match "pando version", shell_output("#{bin}/pando --version")
            end
          end
          EOF

          git config user.name "${APP_SLUG}[bot]"
          git config user.email "${APP_SLUG}[bot]@users.noreply.github.com"
          git add Formula/pando.rb
          git commit -m "brew: pando ${VERSION}" || { echo "no formula change"; exit 0; }
          git push origin "HEAD:${GITHUB_REF_NAME}"
