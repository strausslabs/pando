name: Release

on:
  schedule:
    - cron: "0 9 * * *" # daily at 09:00 UTC
  workflow_dispatch: {} # allow a manual release

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      TAP_TOKEN: ${{ secrets.TAP_TOKEN }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # need tags + full history to diff since last release

      - name: Decide whether to release
        id: decide
        run: |
          last="$(git tag --list 'v*' --sort=-v:refname | head -n1)"
          if [ -z "$last" ]; then
            echo "no prior tag; first release"
            echo "version=v0.1.0" >> "$GITHUB_OUTPUT"
            echo "release=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [ -z "$(git rev-list "$last"..HEAD)" ]; then
            echo "no commits since $last; skipping"
            echo "release=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          # bump patch: vMAJOR.MINOR.PATCH -> vMAJOR.MINOR.(PATCH+1)
          ver="${last#v}"
          major="${ver%%.*}"; rest="${ver#*.}"
          minor="${rest%%.*}"; patch="${rest#*.}"
          next="v${major}.${minor}.$((patch + 1))"
          echo "releasing $next (since $last)"
          echo "version=$next" >> "$GITHUB_OUTPUT"
          echo "release=true" >> "$GITHUB_OUTPUT"

      - uses: actions/setup-go@v5
        if: steps.decide.outputs.release == 'true'
        with:
          go-version: "1.26"
          cache: true

      - uses: oven-sh/setup-bun@v2
        if: steps.decide.outputs.release == 'true'
        with:
          bun-version: latest

      - name: Build UI (embedded by the binary)
        if: steps.decide.outputs.release == 'true'
        working-directory: ui
        run: |
          bun install --frozen-lockfile
          bun run build

      - name: Cross-compile binaries
        if: steps.decide.outputs.release == 'true'
        env:
          VERSION: ${{ steps.decide.outputs.version }}
          CGO_ENABLED: "0"
        run: |
          mkdir -p dist
          for target in darwin/arm64 linux/amd64 linux/arm64; do
            os="${target%/*}"; arch="${target#*/}"
            stage="build/${os}-${arch}"
            mkdir -p "$stage"
            echo "building pando-${os}-${arch}"
            # binary is named "pando" inside the tarball so the brew formula can
            # do a plain bin.install "pando".
            GOOS="$os" GOARCH="$arch" go build -trimpath \
              -ldflags "-s -w -X main.version=${VERSION}" \
              -o "$stage/pando" ./cmd/pando
            tar -czf "dist/pando-${os}-${arch}.tar.gz" -C "$stage" pando
          done
          ( cd dist && sha256sum *.tar.gz > checksums.txt )

      - name: Tag and publish release
        if: steps.decide.outputs.release == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.decide.outputs.version }}
        run: |
          git tag "$VERSION"
          git push origin "$VERSION"
          gh release create "$VERSION" \
            --title "$VERSION" \
            --generate-notes \
            dist/*.tar.gz dist/checksums.txt

      # Regenerate Formula/pando.rb in this repo so `brew upgrade` tracks every
      # release. main is ruleset-protected, so the push uses TAP_TOKEN (a PAT
      # whose owner is an org admin and thus bypasses the ruleset); the default
      # GITHUB_TOKEN cannot bypass. Without the secret this step no-ops.
      - name: Update Homebrew formula
        if: steps.decide.outputs.release == 'true' && env.TAP_TOKEN != ''
        env:
          VERSION: ${{ steps.decide.outputs.version }}
          REPO: ${{ github.repository }}
        run: |
          sha() { awk -v f="$1" '$2==f {print $1}' dist/checksums.txt; }
          dar_arm="$(sha pando-darwin-arm64.tar.gz)"
          lnx_amd="$(sha pando-linux-amd64.tar.gz)"
          lnx_arm="$(sha pando-linux-arm64.tar.gz)"
          base="https://github.com/${REPO}/releases/download/${VERSION}"

          mkdir -p Formula
          cat > Formula/pando.rb <<EOF
          class Pando < Formula
            desc "Fast multi-worktree dev environments"
            homepage "https://github.com/${REPO}"
            version "${VERSION#v}"

            on_macos do
              on_arm do
                url "${base}/pando-darwin-arm64.tar.gz"
                sha256 "${dar_arm}"
              end
            end

            on_linux do
              on_intel do
                url "${base}/pando-linux-amd64.tar.gz"
                sha256 "${lnx_amd}"
              end
              on_arm do
                url "${base}/pando-linux-arm64.tar.gz"
                sha256 "${lnx_arm}"
              end
            end

            def install
              bin.install "pando"
            end

            def caveats
              <<~CAVEATS
                Driving Pando with an AI agent? Run:
                  pando setup
                to install the pando.star skill into ~/.claude/skills and register the
                MCP server (claude mcp add pando -- pando mcp).
              CAVEATS
            end

            test do
              assert_match "pando version", shell_output("#{bin}/pando --version")
            end
          end
          EOF

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/pando.rb
          git commit -m "brew: pando ${VERSION}" || { echo "no formula change"; exit 0; }
          git push "https://x-access-token:${TAP_TOKEN}@github.com/${REPO}.git" "HEAD:${GITHUB_REF_NAME}"
