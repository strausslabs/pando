name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  go:
    name: Go (test + vet + race)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache: true

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      # The daemon go:embeds internal/web/dist, which is gitignored. Build the UI
      # first so the embed has real assets — otherwise vet/test/build fail to
      # compile on a clean checkout.
      - name: Build UI
        working-directory: ui
        run: |
          bun install --frozen-lockfile
          bun run build

      - name: Verify formatting
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "These files are not gofmt-formatted:"
            echo "$unformatted"
            exit 1
          fi

      - name: Vet
        run: go vet ./...

      - name: Test with race detector
        run: go test -race -count=1 -covermode=atomic -coverprofile=coverage.out ./...

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: coverage.out
          slug: strausslabs/pando
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

      - name: Build
        run: go build -o bin/pando ./cmd/pando

  lint:
    name: golangci-lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache: true
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      # golangci-lint compiles the package, so the go:embed target must exist.
      - name: Build UI
        working-directory: ui
        run: |
          bun install --frozen-lockfile
          bun run build
      - uses: golangci/golangci-lint-action@v9
        with:
          version: v2.12.2

  ui:
    name: UI (bun)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ui
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Install
        run: bun install --frozen-lockfile
      - name: Typecheck
        run: bun run typecheck
      - name: Lint
        run: bun run lint
      - name: Test
        run: bun test
