coverage:
  status:
    project:
      default:
        target: auto # ratchet: never drop more than threshold below the parent
        threshold: 1%
    patch:
      default:
        target: 85%
        threshold: 0%

comment:
  layout: "reach, diff, flags, files"
  behavior: default
  require_changes: false

ignore:
  - "internal/web/dist"
  - "cmd/pando"
  - "**/*_test.go"
  - "ui/node_modules"
