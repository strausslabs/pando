coverage:
  status:
    project:
      default:
        target: auto
        threshold: 2%
    patch:
      default:
        target: 70%
        threshold: 5%

comment:
  layout: "reach, diff, flags, files"
  behavior: default
  require_changes: false

ignore:
  - "internal/web/dist"
  - "cmd/pando"
  - "**/*_test.go"
  - "ui/node_modules"
